<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Account • ZeroPoint</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/style.css">
  <script src="/shared.js"></script>
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #041421 0, #02050b 45%, #000 100%);
      color: #eaf7ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* Reuse top bar style from terminal */
    #topBar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.35rem 0.9rem;
      background: rgba(5, 5, 15, 0.98);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(120, 200, 255, 0.3);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.18);
    }

    #brand {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9be7ff;
      font-size: 0.85rem;
    }

    #brand #dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #0ff, #05f);
      box-shadow: 0 0 12px rgba(0, 255, 255, 0.9);
      animation: zp-pulseDot 1.6s infinite alternate;
    }

    @keyframes zp-pulseDot {
      from { transform: scale(1); box-shadow: 0 0 8px rgba(0, 255, 255, 0.7); }
      to   { transform: scale(1.25); box-shadow: 0 0 15px rgba(0, 255, 255, 1); }
    }

    #statusPills {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-left: 0.75rem;
    }

    .pill {
      border-radius: 999px;
      padding: 0.25rem 0.7rem;
      font-size: 0.74rem;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      border: 1px solid transparent;
      text-decoration: none;
      white-space: nowrap;
    }

    .pill.info {
      background: linear-gradient(120deg, rgba(0, 160, 255, 0.1), rgba(0, 255, 255, 0.07));
      border-color: rgba(0, 200, 255, 0.45);
      color: #e0f7ff;
    }

    .pill.ok {
      background: linear-gradient(120deg, rgba(0, 255, 180, 0.1), rgba(0, 255, 120, 0.1));
      border-color: rgba(0, 255, 180, 0.6);
      color: #d8ffe8;
    }

    #topRightBtns {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      margin-left: auto;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.38rem 0.85rem;
      border-radius: 999px;
      border: 1px solid rgba(120, 200, 255, 0.6);
      background:
        radial-gradient(circle at 0 0, rgba(0, 255, 255, 0.23), transparent 55%),
        radial-gradient(circle at 100% 100%, rgba(0, 140, 255, 0.23), transparent 60%),
        rgba(10, 15, 35, 0.96);
      box-shadow:
        0 0 10px rgba(0, 150, 255, 0.3),
        0 0 2px rgba(0, 255, 255, 0.4) inset;
      font-size: 0.72rem;
      font-weight: 600;
      color: #e5f6ff;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
    }

    .nav-btn:hover {
      transform: translateY(-1px) scale(1.02);
      box-shadow:
        0 0 14px rgba(0, 200, 255, 0.65),
        0 0 3px rgba(0, 255, 255, 0.55) inset;
      border-color: rgba(165, 235, 255, 0.95);
    }

    .nav-btn.primary {
      border-color: rgba(0, 255, 187, 0.9);
      box-shadow:
        0 0 14px rgba(0, 250, 180, 0.6),
        0 0 3px rgba(0, 255, 200, 0.7) inset;
      background:
        radial-gradient(circle at 0 0, rgba(0, 255, 200, 0.25), transparent 60%),
        radial-gradient(circle at 100% 100%, rgba(0, 220, 160, 0.28), transparent 60%),
        rgba(8, 25, 20, 0.98);
    }

    #logoutBtn {
      border: none;
      background: transparent;
      color: #ffb3b3;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      margin-left: 0.25rem;
      opacity: 0.9;
      transition: opacity 0.15s ease, transform 0.1s ease;
    }

    #logoutBtn:hover {
      opacity: 1;
      transform: translateY(-1px);
    }

    /* Center box for account info */
    .center-box {
      min-height: calc(100vh - 64px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: rgba(5, 10, 20, 0.96);
      border-radius: 0.9rem;
      padding: 1.4rem 1.6rem;
      border: 1px solid rgba(90, 160, 210, 0.7);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.75);
      max-width: 480px;
      width: 100%;
    }

    .row {
      display: flex;
      align-items: center;
    }

    .row.gap {
      gap: 0.6rem;
    }

    .dim-text {
      color: #9badc0;
      font-size: 0.9rem;
    }

    h2 {
      margin: 0;
    }

    a.simple-link {
      color: #81d9ff;
      text-decoration: none;
      font-size: 0.9rem;
    }

    a.simple-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      #topBar {
        flex-wrap: wrap;
        row-gap: 0.4rem;
        padding: 0.45rem 0.55rem;
      }
      #statusPills {
        margin-left: 0.3rem;
      }
      #topRightBtns {
        width: 100%;
        justify-content: flex-start;
        gap: 0.25rem;
      }
      .center-box {
        padding: 1rem 0.8rem 1.4rem;
      }
      .card {
        padding: 1.1rem 1.1rem;
      }
    }
  </style>
</head>
<body>
  <div id="topBar">
    <div id="brand">
      <div id="dot"></div>
      <div>ZeroPoint</div>
      <div id="statusPills">
        <div id="mePill" class="pill info">Loading…</div>
        <div id="coinsPill" class="pill ok">0 coins</div>
      </div>
    </div>

    <div id="topRightBtns">
      <a class="nav-btn primary" href="/">Terminal</a>
      <a class="nav-btn" href="/mypage">My Page</a>
      <a class="nav-btn" href="/people">People</a>
      <a class="nav-btn" href="/shop">Shop</a>
      <a class="nav-btn" href="/wordle">Wordle</a>
      <a class="nav-btn" href="/codequiz">CodeQuiz</a>
      <a class="nav-btn" href="/how-to-get-coins">Coins</a>
      <button id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="center-box">
    <div class="card">
      <div class="row gap" style="justify-content:space-between; margin-bottom:0.4rem;">
        <h2>Account</h2>
      </div>
      <hr>
      <div id="info" class="dim-text">Loading...</div>
    </div>
  </div>

  <script>
    (async function () {
      const info = document.getElementById("info");
      const logoutBtn = document.getElementById("logoutBtn");
      const mePill = document.getElementById("mePill");
      const coinsPill = document.getElementById("coinsPill");

      const me = await ZeroPoint.api.json("/api/auth/me", { method: "GET" });
      if (!me.loggedIn) {
        location.href = "/login";
        return;
      }

      const coins = await ZeroPoint.api.json("/api/coins/me", { method: "GET" });

      // top bar pills
      mePill.textContent = `${me.user.username} • ${me.user.role} • L${coins.level}`;
      coinsPill.textContent = `${coins.coins} coins`;

      // account info
      info.innerHTML = `
        <div><b>username:</b> ${ZeroPoint.escapeHtml(me.user.username)}</div>
        <div><b>fullName:</b> ${ZeroPoint.escapeHtml(me.user.fullName || "")}</div>
        <div><b>role:</b> ${ZeroPoint.escapeHtml(me.user.role)}</div>
        <div><b>level:</b> ${coins.level}</div>
        <div><b>coins:</b> ${coins.coins}</div>
      `;

      logoutBtn.onclick = async () => {
        await ZeroPoint.logout();
        location.href = "/login";
      };
    })();
  </script>
</body>
</html>
