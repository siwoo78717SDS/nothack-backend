<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login • ZeroPoint</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="center-box">
      <div class="card">
        <h2 style="margin-top:0;">Login</h2>
        <div class="dim-text" style="margin-bottom:12px;">
          Don't have an account? <a href="/register">Register</a>
        </div>

        <input
          id="username"
          placeholder="username"
          autocomplete="username"
          style="width:100%; margin-bottom:8px;"
        />
        <input
          id="password"
          placeholder="password"
          type="password"
          autocomplete="current-password"
          style="width:100%; margin-bottom:8px;"
        />
        <button id="loginBtn" type="button">Login</button>
        <div id="msg" class="dim-text" style="margin-top:10px;"></div>
      </div>
    </div>

    <script>
      (async function () {
        const API_BASE = "https://nothack.onrender.com";

        // Optional: check if already logged in
        try {
          const meRes = await fetch(`${API_BASE}/api/auth/me`, {
            method: "GET",
            credentials: "include"
          });
          const me = await meRes.json().catch(() => ({}));
          if (me && me.loggedIn) {
            location.href = "/";
            return;
          }
        } catch (e) {
          console.warn("auth/me check failed", e);
        }

        const username = document.getElementById("username");
        const password = document.getElementById("password");
        const btn = document.getElementById("loginBtn");
        const msg = document.getElementById("msg");

        btn.onclick = async () => {
          btn.disabled = true;
          msg.textContent = "";

          const body = {
            username: username.value.trim(),
            password: password.value
          };

          if (!body.username || !body.password) {
            msg.textContent = "Please enter username and password.";
            btn.disabled = false;
            return;
          }

          try {
            const res = await fetch(`${API_BASE}/api/auth/login`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify(body)
            });

            const data = await res.json().catch(() => null);

            if (!res.ok || (data && data.error)) {
              msg.textContent =
                (data && data.error) || "Login failed. Please try again.";
              btn.disabled = false;
              return;
            }

            // success
            location.href = "/";
          } catch (err) {
            console.error("LOGIN FETCH ERROR", err);
            msg.textContent = "Network error. Please try again.";
            btn.disabled = false;
          }
        };
      })();
    </script>
  </body>
</html>
